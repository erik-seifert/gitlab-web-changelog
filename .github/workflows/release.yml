name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  release:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build ZIP
        run: |
          VERSION=${{ github.ref_name }}
          ZIP="gitlab-changelog-extension-${VERSION}.zip"
          zip -j "$ZIP" \
            manifest.json \
            background.js \
            content.js \
            content.css \
            options.html \
            options.css \
            options.js \
            popup.html \
            popup.js
          zip "$ZIP" \
            icons/icon16.png \
            icons/icon48.png \
            icons/icon128.png
          echo "ZIP=$ZIP" >> $GITHUB_ENV

      - name: Create GitHub release
        run: |
          gh release create ${{ github.ref_name }} "$ZIP" \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
