name: Publish to Chrome Web Store

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

# Allow the job to push the version-bump commit and tag back to the repo
permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  publish:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4
        with:
          # Use the default GITHUB_TOKEN — permissions: contents: write above
          # lets it push commits and tags back to the repo.
          token: ${{ secrets.GITHUB_TOKEN }}
          # Full history so git push doesn't fail on shallow clones
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Publish
        env:
          CHROME_EXTENSION_ID:  ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID:     ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: node scripts/publish.mjs ${{ inputs.bump }}
