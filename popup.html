<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>GitLab Changelog Generator</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        width: 320px;
        margin: 0;
        padding: 16px;
        color: #333;
      }
      h1 {
        font-size: 16px;
        margin: 0 0 10px;
        color: #6e49cb;
      }
      p {
        font-size: 13px;
        line-height: 1.5;
        margin: 8px 0;
      }
      code {
        background: #f3f3f3;
        padding: 2px 5px;
        border-radius: 3px;
        font-size: 12px;
      }
      ol {
        font-size: 13px;
        padding-left: 20px;
        line-height: 1.6;
      }
      .status {
        background: #f8f4ff;
        border: 1px solid #d4cdf2;
        padding: 8px 10px;
        border-radius: 4px;
        font-size: 12px;
        margin: 10px 0;
      }
      .status.warn {
        background: #fff4e6;
        border-color: #ffd591;
      }
      button {
        display: block;
        width: 100%;
        padding: 8px;
        background: #6e49cb;
        color: #fff;
        border: none;
        border-radius: 4px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 10px;
      }
      button:hover {
        background: #5a3aa8;
      }
    </style>
  </head>
  <body>
    <h1>GitLab Changelog Generator</h1>
    <div id="status" class="status">Loading…</div>
    <p>Click the icon next to a tag on any GitLab project's <code>/-/tags</code> page.</p>
    <button id="open-options">Manage GitLab Instances</button>
    <script src="popup.js"></script>
  </body>
</html>
